<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPlan | Client Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        .navbar-brand {
            font-weight: 700;
            color: #3b82f6 !important;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .selection-card {
            transition: 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .selection-card:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .selection-card.selected {
            border-color: #3b82f6;
            background-color: #dbeafe;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            background-color: #fff;
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-cube me-2"></i>EventPlan</a>
            <span class="navbar-text text-muted">Client Portal</span>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container" style="max-width: 900px;">
        
        <!-- 1. EVENT DETAILS -->
        <div class="card p-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-info-circle me-2 text-primary"></i>Event Details</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Event Name</label>
                    <input type="text" id="eventName" class="form-control" placeholder="e.g. Sarah's Wedding">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Event Date</label>
                    <input type="date" id="eventDate" class="form-control">
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">Venue / Location</label>
                    <input type="text" id="eventVenue" class="form-control" placeholder="e.g. Grand Hotel">
                </div>
            </div>
        </div>

        <!-- 2. DECORATIONS -->
        <div class="card p-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-paint-roller me-2 text-warning"></i>Select Decorations</h5>
            <div class="row" id="decorContainer">
                <!-- Decor Options -->
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'Disco Ball', 50)">
                        <i class="fas fa-compact-disc fa-2x text-muted mb-2"></i>
                        <h6 class="fw-bold">Disco Ball</h6>
                        <small class="text-muted">$50 / unit</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input decor-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'Flower Arch', 200)">
                        <i class="fas fa-leaf fa-2x text-success mb-2"></i>
                        <h6 class="fw-bold">Flower Arch</h6>
                        <small class="text-muted">$200 / unit</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input decor-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'Red Carpet', 100)">
                        <i class="fas fa-rug fa-2x text-danger mb-2"></i>
                        <h6 class="fw-bold">Red Carpet</h6>
                        <small class="text-muted">$100 / unit</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input decor-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. GIG WORKERS -->
        <div class="card p-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-users me-2 text-info"></i>Hire Gig Workers</h5>
            <div class="row" id="workerContainer">
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'DJ Mike', 100)">
                        <i class="fas fa-music fa-2x text-warning mb-2"></i>
                        <h6 class="fw-bold">DJ Mike</h6>
                        <small class="text-muted">$100 / hour</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input worker-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'Photographer Sam', 150)">
                        <i class="fas fa-camera fa-2x text-dark mb-2"></i>
                        <h6 class="fw-bold">Photographer Sam</h6>
                        <small class="text-muted">$150 / hour</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input worker-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card selection-card p-3 text-center" onclick="toggleSelection(this, 'Waiter Staff', 50)">
                        <i class="fas fa-utensils fa-2x text-secondary mb-2"></i>
                        <h6 class="fw-bold">Waiter Staff</h6>
                        <small class="text-muted">$50 / hour</small>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input worker-check" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button onclick="submitEvent()" class="btn btn-primary w-100 py-3 shadow-sm">
            <i class="fas fa-paper-plane me-2"></i> Submit Plan to Admin
        </button>

        <div id="statusMessage" class="mt-3 text-center fw-bold"></div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        const API_URL = 'http://localhost:3000';

        // 1. TOGGLE SELECTION UI
        function toggleSelection(element, name, price) {
            element.classList.toggle('selected');
            const checkbox = element.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
        }

        // 2. SUBMIT EVENT
        async function submitEvent() {
            const name = document.getElementById('eventName').value;
            const date = document.getElementById('eventDate').value;
            const venue = document.getElementById('eventVenue').value;
            const statusMsg = document.getElementById('statusMessage');

            if (!name || !date) {
                alert("Please fill in Event Name and Date.");
                return;
            }

            // Gather Decorations
            const bookedDecor = [];
            document.querySelectorAll('#decorContainer .selected').forEach(card => {
                bookedDecor.push({
                    item_name: card.querySelector('h6').innerText,
                    quantity: 1, // Defaulting to 1 for simplicity
                    cost: 50 // This is a placeholder, in a real app you'd parse the price from the card
                });
            });

            // Gather Workers
            const bookedWorkers = [];
            document.querySelectorAll('#workerContainer .selected').forEach(card => {
                bookedWorkers.push({
                    worker_name: card.querySelector('h6').innerText,
                    hours_needed: 4, // Defaulting to 4 hours
                    cost: 100
                });
            });

            // Construct Data Object (Matches Schema)
            const eventData = {
                client_id: "client_123", // Mock ID
                event_name: name,
                date: date,
                status: "PLANNING",
                booked_decor: bookedDecor,
                booked_workers: bookedWorkers
            };

            try {
                statusMsg.innerHTML = '<span class="text-warning">Sending to server...</span>';
                
                const response = await fetch(`${API_URL}/events`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(eventData)
                });

                if (response.ok) {
                    statusMsg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> Event Plan Sent! Admin will review shortly.</span>';
                    // Optional: Clear form or redirect
                    setTimeout(() => {
                        window.location.href = 'admin.html'; // Send them to the admin dashboard to see it!
                    }, 2000);
                } else {
                    statusMsg.innerHTML = '<span class="text-danger">Failed to send event.</span>';
                }
            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = '<span class="text-danger">Error connecting to server.</span>';
            }
        }
    </script>
</body>
</html>
